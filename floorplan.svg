<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg" class="fp-svg">
    <defs>
        <filter id="fp-glow-on">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="fp-glow-room">
            <feGaussianBlur stdDeviation="8" result="blur"/>
            <feComposite in="blur" in2="SourceGraphic" operator="atop"/>
        </filter>
        <radialGradient id="fp-light-grad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="var(--accent, #f5a623)" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="var(--accent, #f5a623)" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="fp-wall-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0.7)"/>
        </linearGradient>
    </defs>

    <!-- Outer walls -->
    <rect x="20" y="20" width="760" height="960" fill="none" stroke="var(--fp-wall, rgba(255,255,255,0.85))" stroke-width="6" rx="2"/>

    <!-- WOHNZIMMER (L-shape, top-left, large) -->
    <path class="fp-room" id="room-wohnzimmer"
        d="M 23 23 L 560 23 L 560 420 L 400 420 L 400 560 L 23 560 Z"
        fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.85))" stroke-width="3"/>
    <text x="240" y="260" class="fp-room-label">Wohnzimmer</text>
    <text x="240" y="285" class="fp-room-temp">22.4°C</text>

    <!-- KÜCHE (top-right) -->
    <rect class="fp-room" id="room-kueche" x="563" y="23" width="214" height="370"
        fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.85))" stroke-width="3"/>
    <text x="670" y="180" class="fp-room-label">Küche</text>
    <text x="670" y="205" class="fp-room-temp">21.8°C</text>

    <!-- GÄSTE-WC (right side, below küche) -->
    <rect class="fp-room" id="room-gaestewc" x="620" y="396" width="157" height="110"
        fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.85))" stroke-width="3"/>
    <text x="698" y="458" class="fp-room-label-sm">Gäste-WC</text>

    <!-- WINDFANG (right side, below gäste-wc) -->
    <rect class="fp-room" id="room-windfang" x="620" y="509" width="157" height="140"
        fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.85))" stroke-width="3"/>
    <text x="698" y="585" class="fp-room-label-sm">Windfang</text>

    <!-- FLUR (center, vertical) -->
    <rect class="fp-room" id="room-flur" x="403" y="423" width="100" height="390"
        fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.85))" stroke-width="2.5"/>
    <text x="453" y="620" class="fp-room-label-sm">Flur</text>

    <!-- SCHLAFZIMMER (left, middle) -->
    <rect class="fp-room" id="room-schlafzimmer" x="23" y="563" width="377" height="310"
        fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.85))" stroke-width="3"/>
    <text x="210" y="710" class="fp-room-label">Schlafzimmer</text>
    <text x="210" y="735" class="fp-room-temp">20.5°C</text>

    <!-- TREPPE (right, middle) -->
    <rect class="fp-room" id="room-treppe" x="506" y="423" width="111" height="83"
        fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.85))" stroke-width="2"/>
    <text x="561" y="470" class="fp-room-label-sm">Treppe</text>
    <!-- Stair lines -->
    <line x1="516" y1="440" x2="607" y2="440" stroke="var(--fp-wall, rgba(255,255,255,0.3))" stroke-width="1"/>
    <line x1="516" y1="452" x2="607" y2="452" stroke="var(--fp-wall, rgba(255,255,255,0.3))" stroke-width="1"/>
    <line x1="516" y1="464" x2="607" y2="464" stroke="var(--fp-wall, rgba(255,255,255,0.3))" stroke-width="1"/>
    <line x1="516" y1="476" x2="607" y2="476" stroke="var(--fp-wall, rgba(255,255,255,0.3))" stroke-width="1"/>
    <line x1="516" y1="488" x2="607" y2="488" stroke="var(--fp-wall, rgba(255,255,255,0.3))" stroke-width="1"/>

    <!-- BAD (right, below treppe) -->
    <rect class="fp-room" id="room-bad" x="506" y="509" width="111" height="180"
        fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.85))" stroke-width="3"/>
    <text x="561" y="605" class="fp-room-label-sm">Bad</text>
    <text x="561" y="625" class="fp-room-temp">23.1°C</text>

    <!-- BÜRO (bottom-left) -->
    <rect class="fp-room" id="room-buero" x="23" y="876" width="377" height="101"
        fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.85))" stroke-width="3"/>
    <text x="210" y="932" class="fp-room-label">Büro</text>
    <text x="210" y="955" class="fp-room-temp">22.0°C</text>

    <!-- GÄSTEZIMMER (bottom-right) -->
    <rect class="fp-room" id="room-gaestezimmer" x="506" y="692" width="271" height="285"
        fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.85))" stroke-width="3"/>
    <text x="641" y="830" class="fp-room-label">Gästezimmer</text>
    <text x="641" y="855" class="fp-room-temp">21.2°C</text>

    <!-- HAUSWIRTSCHAFT (bottom-center) -->
    <rect class="fp-room" id="room-hwl" x="403" y="816" width="100" height="161"
        fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.85))" stroke-width="2"/>
    <text x="453" y="895" class="fp-room-label-xs">HWR</text>

    <!-- === DOORS === -->
    <!-- Haustür (right side, windfang) -->
    <rect x="772" y="545" width="8" height="70" fill="var(--accent, #f5a623)" opacity="0.7" rx="2"/>
    <!-- Terrassentür (top-left, wohnzimmer) -->
    <rect x="80" y="14" width="90" height="8" fill="var(--accent, #f5a623)" opacity="0.7" rx="2"/>

    <!-- === WINDOWS === -->
    <rect x="440" y="14" width="80" height="6" fill="rgba(100,200,255,0.5)" rx="2"/>
    <rect x="772" y="180" width="6" height="60" fill="rgba(100,200,255,0.5)" rx="2"/>
    <rect x="772" y="430" width="6" height="45" fill="rgba(100,200,255,0.5)" rx="2"/>
    <rect x="772" y="750" width="6" height="70" fill="rgba(100,200,255,0.5)" rx="2"/>
    <rect x="200" y="971" width="80" height="6" fill="rgba(100,200,255,0.5)" rx="2"/>

    <!-- === LIGHTS === -->
    <!-- Wohnzimmer Deckenlampe -->
    <circle class="fp-light fp-light-on" cx="280" cy="200" r="8" filter="url(#fp-glow-on)"/>
    <!-- Esstisch -->
    <circle class="fp-light fp-light-on" cx="440" cy="320" r="7" filter="url(#fp-glow-on)"/>
    <!-- Wohnzimmer Leselicht -->
    <circle class="fp-light fp-light-dim" cx="120" cy="420" r="5"/>
    <!-- Küche -->
    <circle class="fp-light fp-light-on" cx="670" cy="150" r="6" filter="url(#fp-glow-on)"/>
    <!-- Schlafzimmer -->
    <circle class="fp-light fp-light-off" cx="210" cy="680" r="6"/>
    <!-- Bad -->
    <circle class="fp-light fp-light-on" cx="561" cy="570" r="5" filter="url(#fp-glow-on)"/>
    <!-- Büro -->
    <circle class="fp-light fp-light-on" cx="210" cy="920" r="6" filter="url(#fp-glow-on)"/>

    <!-- === LIGHT CONES (subtle ambient glow) === -->
    <ellipse cx="280" cy="200" rx="50" ry="40" fill="url(#fp-light-grad)" class="fp-cone"/>
    <ellipse cx="440" cy="320" rx="40" ry="30" fill="url(#fp-light-grad)" class="fp-cone"/>
    <ellipse cx="670" cy="150" rx="35" ry="28" fill="url(#fp-light-grad)" class="fp-cone"/>

    <!-- === FURNITURE (subtle indicators) === -->
    <!-- Couch (wohnzimmer) -->
    <rect x="100" y="300" width="120" height="50" rx="8" fill="var(--fp-furniture, rgba(255,255,255,0.06))" stroke="var(--fp-wall, rgba(255,255,255,0.15))" stroke-width="1"/>
    <!-- TV -->
    <rect x="80" y="200" width="8" height="60" rx="2" fill="var(--fp-furniture, rgba(255,255,255,0.1))"/>
    <!-- Küche Zeile -->
    <rect x="570" y="30" width="200" height="25" rx="4" fill="var(--fp-furniture, rgba(255,255,255,0.06))" stroke="var(--fp-wall, rgba(255,255,255,0.15))" stroke-width="1"/>
    <!-- Esstisch -->
    <rect x="410" y="290" width="80" height="55" rx="6" fill="var(--fp-furniture, rgba(255,255,255,0.06))" stroke="var(--fp-wall, rgba(255,255,255,0.15))" stroke-width="1"/>
    <!-- Bett -->
    <rect x="130" y="640" width="140" height="100" rx="8" fill="var(--fp-furniture, rgba(255,255,255,0.06))" stroke="var(--fp-wall, rgba(255,255,255,0.15))" stroke-width="1"/>
    <!-- Schreibtisch (Büro) -->
    <rect x="120" y="900" width="100" height="40" rx="4" fill="var(--fp-furniture, rgba(255,255,255,0.06))" stroke="var(--fp-wall, rgba(255,255,255,0.15))" stroke-width="1"/>

    <!-- === STATUS INDICATORS === -->
    <circle cx="750" cy="580" r="4" fill="#4ade80" class="fp-status-online"/>
    <text x="750" y="598" class="fp-status-text">Verschlossen</text>
</svg>
