<svg viewBox="0 0 900 1050" xmlns="http://www.w3.org/2000/svg" class="fp-svg">
    <defs>
        <filter id="fp-glow-on">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <radialGradient id="fp-light-grad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="var(--accent, #f5a623)" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="var(--accent, #f5a623)" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <!-- ==================== OG (Top, offset top-right) ==================== -->
    <g id="floor-og" transform="translate(160, 0)">
        <!-- Floor label -->
        <text x="-60" y="35" class="fp-floor-label"><tspan data-de="">OG</tspan><tspan data-en="">2F</tspan></text>

        <!-- Outer wall -->
        <rect x="20" y="20" width="540" height="300" fill="var(--fp-floor-bg, rgba(255,255,255,0.02))" stroke="var(--fp-wall, rgba(255,255,255,0.7))" stroke-width="4" rx="2"/>

        <!-- Rooms -->
        <rect class="fp-room" id="room-kinderzimmer1" x="23" y="23" width="200" height="294" fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.5))" stroke-width="2"/>
        <text x="123" y="150" class="fp-room-label"><tspan data-de="">Kinderzimmer</tspan><tspan data-en="">Kids Room</tspan></text>
        <text x="123" y="172" class="fp-room-temp">21.5°C</text>

        <rect class="fp-room" id="room-kinderzimmer2" x="226" y="23" width="200" height="170" fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.5))" stroke-width="2"/>
        <text x="326" y="110" class="fp-room-label"><tspan data-de="">Spielzimmer</tspan><tspan data-en="">Playroom</tspan></text>
        <text x="326" y="132" class="fp-room-temp">22.1°C</text>

        <rect class="fp-room" id="room-bad-og" x="429" y="23" width="128" height="170" fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.5))" stroke-width="2"/>
        <text x="493" y="105" class="fp-room-label-sm"><tspan data-de="">Bad OG</tspan><tspan data-en="">Bath 2F</tspan></text>
        <text x="493" y="125" class="fp-room-temp">23.5°C</text>

        <rect class="fp-room" id="room-flur-og" x="226" y="196" width="331" height="121" fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.5))" stroke-width="2"/>
        <text x="391" y="265" class="fp-room-label-sm"><tspan data-de="">Galerie</tspan><tspan data-en="">Gallery</tspan></text>

        <!-- Lights OG -->
        <circle class="fp-light fp-light-off" cx="123" cy="120" r="5"/>
        <circle class="fp-light fp-light-off" cx="326" cy="85" r="5"/>
        <circle class="fp-light fp-light-on" cx="493" cy="80" r="4" filter="url(#fp-glow-on)"/>
        <circle class="fp-light fp-light-dim" cx="391" cy="240" r="4"/>

        <!-- Window indicators -->
        <rect x="60" y="14" width="70" height="5" fill="rgba(100,200,255,0.4)" rx="2"/>
        <rect x="280" y="14" width="70" height="5" fill="rgba(100,200,255,0.4)" rx="2"/>
        <rect x="555" y="60" width="5" height="50" fill="rgba(100,200,255,0.4)" rx="2"/>
    </g>

    <!-- Connecting lines (isometric depth) -->
    <line x1="180" y1="320" x2="100" y2="390" stroke="var(--fp-wall, rgba(255,255,255,0.15))" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="700" y1="320" x2="620" y2="390" stroke="var(--fp-wall, rgba(255,255,255,0.15))" stroke-width="1" stroke-dasharray="4 4"/>

    <!-- ==================== EG (Middle, main floor) ==================== -->
    <g id="floor-eg" transform="translate(80, 350)">
        <!-- Floor label -->
        <text x="-60" y="35" class="fp-floor-label"><tspan data-de="">EG</tspan><tspan data-en="">1F</tspan></text>

        <!-- Outer wall -->
        <rect x="20" y="20" width="620" height="370" fill="var(--fp-floor-bg, rgba(255,255,255,0.02))" stroke="var(--fp-wall, rgba(255,255,255,0.85))" stroke-width="5" rx="2"/>

        <!-- Wohnzimmer (L-shape) -->
        <path class="fp-room" id="room-wohnzimmer"
            d="M 23 23 L 420 23 L 420 200 L 310 200 L 310 260 L 23 260 Z"
            fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.7))" stroke-width="2.5"/>
        <text x="190" y="130" class="fp-room-label"><tspan data-de="">Wohnzimmer</tspan><tspan data-en="">Living Room</tspan></text>
        <text x="190" y="155" class="fp-room-temp">22.4°C</text>

        <!-- Küche -->
        <rect class="fp-room" id="room-kueche" x="423" y="23" width="214" height="180"
            fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.7))" stroke-width="2.5"/>
        <text x="530" y="105" class="fp-room-label"><tspan data-de="">Küche</tspan><tspan data-en="">Kitchen</tspan></text>
        <text x="530" y="128" class="fp-room-temp">21.8°C</text>

        <!-- Flur -->
        <rect class="fp-room" id="room-flur" x="313" y="203" width="70" height="184"
            fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.5))" stroke-width="2"/>
        <text x="348" y="300" class="fp-room-label-xs"><tspan data-de="">Flur</tspan><tspan data-en="">Hall</tspan></text>

        <!-- Gäste-WC -->
        <rect class="fp-room" id="room-gaestewc" x="500" y="206" width="137" height="80"
            fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.5))" stroke-width="2"/>
        <text x="568" y="252" class="fp-room-label-sm"><tspan data-de="">Gäste-WC</tspan><tspan data-en="">Guest WC</tspan></text>

        <!-- Windfang -->
        <rect class="fp-room" id="room-windfang" x="500" y="289" width="137" height="98"
            fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.5))" stroke-width="2"/>
        <text x="568" y="345" class="fp-room-label-sm"><tspan data-de="">Windfang</tspan><tspan data-en="">Entrance</tspan></text>

        <!-- Schlafzimmer -->
        <rect class="fp-room" id="room-schlafzimmer" x="23" y="263" width="287" height="124"
            fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.7))" stroke-width="2.5"/>
        <text x="166" y="325" class="fp-room-label"><tspan data-de="">Schlafzimmer</tspan><tspan data-en="">Bedroom</tspan></text>
        <text x="166" y="348" class="fp-room-temp">20.5°C</text>

        <!-- Bad -->
        <rect class="fp-room" id="room-bad" x="386" y="206" width="111" height="100"
            fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.5))" stroke-width="2"/>
        <text x="441" y="260" class="fp-room-label-sm"><tspan data-de="">Bad</tspan><tspan data-en="">Bath</tspan></text>
        <text x="441" y="278" class="fp-room-temp">23.1°C</text>

        <!-- Lights EG -->
        <circle class="fp-light fp-light-on" cx="190" cy="100" r="6" filter="url(#fp-glow-on)"/>
        <circle class="fp-light fp-light-on" cx="350" cy="100" r="5" filter="url(#fp-glow-on)"/>
        <circle class="fp-light fp-light-on" cx="530" cy="75" r="5" filter="url(#fp-glow-on)"/>
        <circle class="fp-light fp-light-dim" cx="100" cy="220" r="4"/>
        <circle class="fp-light fp-light-off" cx="166" cy="310" r="5"/>
        <circle class="fp-light fp-light-on" cx="441" cy="235" r="4" filter="url(#fp-glow-on)"/>

        <!-- Light cones -->
        <ellipse cx="190" cy="100" rx="40" ry="30" fill="url(#fp-light-grad)" class="fp-cone"/>
        <ellipse cx="530" cy="75" rx="30" ry="25" fill="url(#fp-light-grad)" class="fp-cone"/>

        <!-- Doors -->
        <rect x="634" y="310" width="6" height="50" fill="var(--accent, #f5a623)" opacity="0.6" rx="2"/>
        <rect x="80" y="14" width="70" height="6" fill="var(--accent, #f5a623)" opacity="0.6" rx="2"/>

        <!-- Windows -->
        <rect x="250" y="14" width="80" height="5" fill="rgba(100,200,255,0.4)" rx="2"/>
        <rect x="634" y="100" width="5" height="50" fill="rgba(100,200,255,0.4)" rx="2"/>
        <rect x="634" y="220" width="5" height="40" fill="rgba(100,200,255,0.4)" rx="2"/>
        <rect x="80" y="384" width="70" height="5" fill="rgba(100,200,255,0.4)" rx="2"/>

        <!-- Furniture hints -->
        <rect x="55" y="120" width="90" height="40" rx="6" fill="var(--fp-furniture, rgba(255,255,255,0.04))" stroke="var(--fp-wall, rgba(255,255,255,0.1))" stroke-width="1"/>
        <rect x="430" y="30" width="190" height="18" rx="3" fill="var(--fp-furniture, rgba(255,255,255,0.04))" stroke="var(--fp-wall, rgba(255,255,255,0.1))" stroke-width="1"/>
        <rect x="70" y="290" width="110" height="70" rx="6" fill="var(--fp-furniture, rgba(255,255,255,0.04))" stroke="var(--fp-wall, rgba(255,255,255,0.1))" stroke-width="1"/>

        <!-- Status: Haustür -->
        <circle cx="630" cy="335" r="3" fill="#4ade80" class="fp-status-online"/>
    </g>

    <!-- Connecting lines EG → KG -->
    <line x1="100" y1="720" x2="40" y2="790" stroke="var(--fp-wall, rgba(255,255,255,0.15))" stroke-width="1" stroke-dasharray="4 4"/>
    <line x1="700" y1="720" x2="640" y2="790" stroke="var(--fp-wall, rgba(255,255,255,0.15))" stroke-width="1" stroke-dasharray="4 4"/>

    <!-- ==================== KG (Bottom, offset bottom-left) ==================== -->
    <g id="floor-kg" transform="translate(0, 750)">
        <!-- Floor label -->
        <text x="10" y="12" class="fp-floor-label"><tspan data-de="">KG</tspan><tspan data-en="">B1</tspan></text>

        <!-- Outer wall -->
        <rect x="20" y="20" width="520" height="240" fill="var(--fp-floor-bg, rgba(255,255,255,0.02))" stroke="var(--fp-wall, rgba(255,255,255,0.5))" stroke-width="3.5" rx="2"/>

        <!-- Technikraum -->
        <rect class="fp-room" id="room-technik" x="23" y="23" width="200" height="234"
            fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.4))" stroke-width="2"/>
        <text x="123" y="130" class="fp-room-label"><tspan data-de="">Technikraum</tspan><tspan data-en="">Utility Room</tspan></text>
        <text x="123" y="152" class="fp-room-label-xs"><tspan data-de="">HA Server</tspan><tspan data-en="">HA Server</tspan></text>
        <text x="123" y="172" class="fp-room-temp">19.8°C</text>

        <!-- Waschraum -->
        <rect class="fp-room" id="room-waschraum" x="226" y="23" width="170" height="234"
            fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.4))" stroke-width="2"/>
        <text x="311" y="140" class="fp-room-label-sm"><tspan data-de="">Waschraum</tspan><tspan data-en="">Laundry</tspan></text>

        <!-- Lager -->
        <rect class="fp-room" id="room-lager" x="399" y="23" width="138" height="234"
            fill="var(--fp-room-bg, rgba(255,255,255,0.03))" stroke="var(--fp-wall, rgba(255,255,255,0.4))" stroke-width="2"/>
        <text x="468" y="140" class="fp-room-label-sm"><tspan data-de="">Lager</tspan><tspan data-en="">Storage</tspan></text>

        <!-- Lights KG -->
        <circle class="fp-light fp-light-on" cx="123" cy="100" r="4" filter="url(#fp-glow-on)"/>
        <circle class="fp-light fp-light-off" cx="311" cy="110" r="4"/>
        <circle class="fp-light fp-light-off" cx="468" cy="110" r="4"/>

        <!-- Server rack indicator -->
        <rect x="50" y="50" width="40" height="60" rx="4" fill="var(--fp-furniture, rgba(255,255,255,0.06))" stroke="var(--accent, #c45d1a)" stroke-width="1.5" opacity="0.6"/>
        <circle cx="70" cy="65" r="2" fill="#4ade80" class="fp-status-online"/>
        <circle cx="70" cy="75" r="2" fill="#4ade80" class="fp-status-online"/>
        <circle cx="70" cy="85" r="2" fill="var(--accent, #c45d1a)" class="fp-status-online"/>
    </g>
</svg>
